# mpvpp configuration — flat "key = value", strictly declarative (no code/shell).
#
# Resolution order (later overrides earlier, per-key shallow merge):
#   1. built-in defaults (shown below)
#   2. ~/.config/mpvpp/config.conf            (your base config; copy this file there)
#   3. a per-directory cascade: a ".mpvpp.conf" in each ancestor directory of the
#      media file, from filesystem root down to the file's own folder. The folder
#      CLOSEST to the media wins. (URLs/streams get levels 1-2 only.)
#
# Comments: a line whose first non-space char is '#' or ';'. Booleans accept
# yes/no, true/false, on/off, 1/0. Unknown keys or bad values are warned and
# ignored (your prior value is kept).

# --- recording & prompting -------------------------------------------------

# Master switch. If no, mpvpp is fully inert for this media (no save, no prompt).
record_position = yes

# Show the resume/finished prompt, or act silently (resume / handle directly).
show_prompt = yes

# Force the terminal prompt even when a video/album-art window is being drawn.
# (By default, a window -> on-screen OSD prompt; no window -> terminal prompt.)
cli_prompt_only = no

# What to do when the terminal prompt is wanted but there's no terminal attached
# (e.g. background audio launched from a file manager: no window, no stdout):
#   resume        -> silently resume from the saved position
#   beginning     -> silently start from the beginning
#   force_window  -> force a window so the OSD prompt can show
no_ui_fallback = resume

# --- resume tuning ---------------------------------------------------------

# Write the position at most once every N seconds of playback (crash safety).
save_interval = 5

# Resume floor: ignore saved positions below N seconds (no "resume from 8s").
min_position = 30

# --- finished detection & handling -----------------------------------------

# How close to the end counts as "finished". Accepts EITHER an absolute time
# OR a percentage/fraction; the shape decides:
#   97%      | 90%        -> percentage of duration
#   0.97     | 0.9        -> fraction of duration
#   15s | 2m | 1m30s | 1:30 | 1:02:03 | 1h   -> absolute time from the end
#   15  | 90              -> bare number >= 1 means seconds from the end
finished_at = 97%

# What to do when a media is already finished:
#   skip                -> advance to the next playlist entry (great for TV seasons).
#                          If there's no next entry, falls back to play_from_beginning.
#   play_from_beginning -> restart it (great for a finished movie).
finished_behavior = play_from_beginning
